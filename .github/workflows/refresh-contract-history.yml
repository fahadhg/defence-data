name: Refresh deep contract history

on:
  schedule:
    # Monthly (1st). Proactive disclosure is reported quarterly upstream. Off the exact hour
    # so this round-hour slot isn't GitHub's most congested.
    - cron: "27 16 1 * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Ingest contract history into Postgres
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx scripts/ingest-contract-history.ts
