name: Refresh defence investment plan snapshot

on:
  schedule:
    # Monthly (1st). DND's Defence Capabilities Blueprint updates infrequently (annual cycle).
    # Off the exact hour so this round-hour slot isn't GitHub's most congested.
    - cron: "17 15 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run snapshot:blueprint

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/defence-investment-plan.json; then
            git add data/defence-investment-plan.json
            git commit -m "chore: refresh defence investment plan snapshot"
            git push
          else
            echo "No changes to snapshot."
          fi
